name: yofreelancer
description: YO FREE-LANCER - Plataforma de servicios freelance para México

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Supabase (Backend as a Service) ──────────────────────────────────────
  supabase_flutter: ^2.3.4

  # ── State Management (MVVM) ───────────────────────────────────────────────
  provider: ^6.1.2
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Routing ───────────────────────────────────────────────────────────────
  go_router: ^17.3.0

  # ── Dependency Injection ──────────────────────────────────────────────────
  get_it: ^9.2.1
  injectable: ^2.4.2

  # ── Networking / HTTP ─────────────────────────────────────────────────────
  dio: ^5.4.3+1
  http: ^1.2.1
  connectivity_plus: ^7.1.1

  # ── Local Storage ─────────────────────────────────────────────────────────
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^10.3.1
  sqflite: ^2.3.3

  # ── UI & Design ───────────────────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  animate_do: ^5.1.0
  flutter_staggered_animations: ^1.1.1
  google_fonts: ^8.1.0
  cupertino_icons: ^1.0.8
  material_color_utilities: ^0.13.0

  # ── Image & Media ─────────────────────────────────────────────────────────
  image_picker: ^1.1.2
  image_cropper: ^12.2.1
  photo_view: ^0.15.0

  # ── Maps & Location ───────────────────────────────────────────────────────
  geolocator: ^14.0.3
  geocoding: ^4.0.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # ── Forms & Validation ────────────────────────────────────────────────────
  reactive_forms: ^18.2.2
  form_field_validator: ^1.1.0

  # ── Utils ─────────────────────────────────────────────────────────────────
  intl: ^0.20.2
  equatable: ^2.0.5
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  logger: ^2.4.0
  timeago: ^3.6.1
  url_launcher: ^6.3.0
  package_info_plus: ^10.1.0
  device_info_plus: ^13.1.0
  permission_handler: ^12.0.3
  flutter_local_notifications: ^22.0.1

  # ── Charts & Analytics ────────────────────────────────────────────────────
  fl_chart: ^1.2.0

  # ── Payments ─────────────────────────────────────────────────────────────
  flutter_stripe: ^10.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.10
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.3
  riverpod_lint: ^2.3.13
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
